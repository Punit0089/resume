<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
</head>

<body>
    <link rel="stylesheet" href="style.css">
    <div class="outer-box">
        <div class="inner-box">
            <header class="signup-header">
                <h1>Signup</h1>
                <p>It just takes 30 seconds</p><br>
            </header>
            <main class="signup-body">
                <form action="">
                    <p>
                        <label for="fullname">FUll Name</label><br>
                        <input type="text" id="fullname" placeholder="Enter your name" required><br>
                    </p>
                    <p>
                        <label for="email">Email</label><br>
                        <input type="email" id="email" placeholder="Enter your email" required><br>
                    </p>
                    <p>
                        <label for="password">Password</label><br>
                        <input type="password" id="password" placeholder="Enter your password" required><br><br>
                    </p>
                    <p>
                        <input type="submit" id="submit" value="Create Account"><br>
                    </p>
                </form>

                <footer class="signup-footer">
                    <p>Already have an account? <a href="#">Login</a></p>
                </footer>
        </div>
        <div class="circle c1"></div>
        <div class="circle c2"></div>
    </div>
</body>

</html>
